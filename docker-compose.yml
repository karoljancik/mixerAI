name: mixerai

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: mixerai
      POSTGRES_PASSWORD: mixeraipassword
      POSTGRES_DB: mixerai_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    ports:
      - "8080:8080"
    volumes:
      - tracks-data:/app/src/MixerAI.Backend/App_Data/UserTracks
      - renders-data:/app/src/MixerAI.Backend/App_Data/RenderedMixes
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=mixerai_db;Username=mixerai;Password=mixeraipassword
      - ASPNETCORE_ENVIRONMENT=Production
    depends_on:
      - postgres

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    ports:
      - "5000:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - BackendApi__BaseUrl=http://backend:8080
    depends_on:
      - backend

volumes:
  pgdata:
  tracks-data:
  renders-data:
